name: Lint and Format

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  lint-and-format:
    name: ESLint and Prettier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: |
          if ! npm run lint; then
            echo "::error title=ESLint failed::Run npm run lint:fix locally, review the changes, and commit the fixes."
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Prettier check
        id: prettier
        continue-on-error: true
        run: |
          if ! npm run format:check; then
            echo "::error title=Prettier check failed::Run npm run format locally, review the changes, and commit the fixes."
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail on lint or format issues
        if: steps.eslint.outputs.failed == 'true' || steps.prettier.outputs.failed == 'true'
        run: |
          echo "::error title=Quality checks failed::Fix the annotated ESLint or Prettier issues and push again."
          exit 1
